<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Finance</title>
<style>
  :root{
    --bg:#0b0e14; --card:#151a23; --card2:#1c2230; --line:#252c3a;
    --text:#e6e9ef; --muted:#8a93a6; --accent:#4f9dff; --good:#36c98a; --warn:#f0a52b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased}
  body{padding:max(16px,env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom))}
  .wrap{max-width:560px;margin:0 auto}
  h1{font-size:20px;font-weight:700;margin:4px 0 2px}
  .sub{color:var(--muted);font-size:12px;margin-bottom:18px}
  .gate{margin-top:22vh;text-align:center}
  .gate p{color:var(--muted);font-size:14px;margin:10px 0 18px}
  input[type=password]{width:100%;max-width:320px;padding:13px 15px;border-radius:12px;
    border:1px solid var(--line);background:var(--card);color:var(--text);font-size:16px;outline:none}
  input[type=password]:focus{border-color:var(--accent)}
  button{cursor:pointer;border:none;border-radius:12px;background:var(--accent);color:#fff;
    font-size:15px;font-weight:600;padding:13px 20px;margin-top:12px}
  button.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
  .err{color:#ff6b6b;font-size:13px;min-height:18px;margin-top:10px}
  .cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 12px}
  .stat .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:19px;font-weight:700;margin-top:5px;line-height:1.1}
  .stat .v small{font-size:11px;color:var(--muted);font-weight:500}
  .section{margin-top:22px}
  .section h2{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:none}
  .row .m{font-size:14px;font-weight:600}
  .row .d{font-size:12px;color:var(--muted);margin-top:2px}
  .row .a{font-size:14px;font-weight:700;white-space:nowrap}
  .pill{display:inline-block;font-size:10px;color:var(--warn);border:1px solid var(--warn);
    border-radius:20px;padding:1px 7px;margin-left:6px;vertical-align:middle}
  .catbar{margin:9px 0}
  .catbar .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
  .catbar .track{height:7px;background:var(--card2);border-radius:6px;overflow:hidden}
  .catbar .fill{height:100%;background:var(--accent);border-radius:6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .review{color:var(--warn);font-size:12px}
  .hidden{display:none}
  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:22px}
</style>
</head>
<body>
<div class="wrap">

  <div id="gate" class="gate">
    <h1>Finance</h1>
    <p>Enter your passphrase to view your spending.<br>Decryption happens on your device.</p>
    <form id="gateForm" autocomplete="off">
      <input id="pass" type="password" placeholder="Passphrase" autocomplete="current-password">
      <div><button type="submit">Unlock</button></div>
      <div class="err" id="err"></div>
    </form>
  </div>

  <div id="app" class="hidden">
    <div class="bar">
      <div>
        <h1>Spending</h1>
        <div class="sub" id="updated"></div>
      </div>
      <button class="ghost" id="refresh">Refresh</button>
    </div>

    <div class="cards">
      <div class="stat"><div class="k">Today</div><div class="v" id="t-today"></div></div>
      <div class="stat"><div class="k">This week</div><div class="v" id="t-week"></div></div>
      <div class="stat"><div class="k">This month</div><div class="v" id="t-month"></div></div>
    </div>
    <div class="review hidden" id="reviewLine"></div>

    <div class="section">
      <h2>This month by category</h2>
      <div class="card" id="cats"></div>
    </div>

    <div class="section">
      <h2>Recent</h2>
      <div class="card" id="recent"></div>
    </div>

    <div class="foot">Private · encrypted · served from GitHub Pages<br>
      <a href="#" id="lock" style="color:var(--muted)">Lock</a></div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
const money = (n, c) => (c||'AED') + ' ' + Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

async function deriveKey(passphrase, salt, iters){
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(passphrase),
    'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:iters, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['decrypt']);
}

async function loadAndDecrypt(passphrase){
  const env = await fetch('data.enc?_=' + Date.now()).then(r => {
    if(!r.ok) throw new Error('Could not load data ('+r.status+')'); return r.json(); });
  const key = await deriveKey(passphrase, b64(env.salt), env.iter || 200000);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(env.iv)}, key, b64(env.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

function render(d){
  $('t-today').innerHTML = money(d.totals.today, d.currency);
  $('t-week').innerHTML  = money(d.totals.week,  d.currency);
  $('t-month').innerHTML = money(d.totals.month, d.currency);

  if(d.count_needs_review > 0){
    $('reviewLine').textContent = d.count_needs_review + ' transaction(s) need review';
    $('reviewLine').classList.remove('hidden');
  } else { $('reviewLine').classList.add('hidden'); }

  const cats = d.by_category_month || [];
  const max = cats.reduce((m,c)=>Math.max(m,c.amount),0) || 1;
  $('cats').innerHTML = cats.length ? cats.map(c=>`
    <div class="catbar">
      <div class="top"><span>${esc(c.category)}</span><span>${money(c.amount,d.currency)}</span></div>
      <div class="track"><div class="fill" style="width:${Math.max(4,(c.amount/max*100)).toFixed(1)}%"></div></div>
    </div>`).join('') : '<div class="sub">No spending this month yet.</div>';

  const rec = d.recent || [];
  $('recent').innerHTML = rec.length ? rec.map(t=>`
    <div class="row">
      <div>
        <div class="m">${esc(t.merchant)}${t.needs_review?'<span class="pill">review</span>':''}</div>
        <div class="d">${esc(t.date)} · ${esc(t.category)}</div>
      </div>
      <div class="a" style="color:${t.type==='income'?'var(--good)':'var(--text)'}">
        ${t.type==='income'?'+':''}${money(t.amount,t.currency)}</div>
    </div>`).join('') : '<div class="sub">No transactions yet.</div>';

  const dt = new Date(d.generated_at);
  $('updated').textContent = 'Updated ' + (isNaN(dt) ? d.generated_at : dt.toLocaleString());
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function unlock(passphrase, remember){
  $('err').textContent = '';
  try{
    const data = await loadAndDecrypt(passphrase);
    if(remember) sessionStorage.setItem('pf_pass', passphrase);
    $('gate').classList.add('hidden'); $('app').classList.remove('hidden');
    render(data);
  }catch(e){
    sessionStorage.removeItem('pf_pass');
    $('err').textContent = /load data/.test(e.message) ? e.message : 'Wrong passphrase, or data not available yet.';
  }
}

$('gateForm').addEventListener('submit', e=>{ e.preventDefault(); unlock($('pass').value, true); });
$('refresh').addEventListener('click', ()=>{ const p = sessionStorage.getItem('pf_pass'); if(p) unlock(p, true); });
$('lock').addEventListener('click', e=>{ e.preventDefault(); sessionStorage.removeItem('pf_pass'); location.reload(); });

// auto-unlock within the same session
const saved = sessionStorage.getItem('pf_pass');
if(saved) unlock(saved, true);
</script>
</body>
</html>
